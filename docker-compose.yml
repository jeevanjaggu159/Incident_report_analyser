version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: incident_postgres
    environment:
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_password
      POSTGRES_DB: incident_analyzer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incident_network

  # Backend FastAPI Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: incident_backend
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_analyzer_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      DEBUG: "false"
      CORS_ORIGINS: ["http://localhost:3000", "http://localhost:5173", "http://frontend"]
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - incident_network
    restart: unless-stopped

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: incident_frontend
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - incident_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  incident_network:
    driver: bridge
